# HLS-to-TS SCTE-35 Pipeline Configuration
# Target: vm100 (192.168.1.42)

[source]
# HLS source URL - master or media playlist
url = "http://127.0.0.1:8899/index.m3u8"

# Poll interval in seconds (match segment duration)
poll_interval = 6.0

# Optional: HTTP headers for auth
# headers = { Authorization = "Bearer <token>" }

[scte35]
# SCTE-35 output PID in the transport stream
pid = 500          # 0x01F4

# Default splice duration (seconds) if CUE-OUT has no duration
default_duration = 30.0

# Pre-roll: inject splice_insert this many seconds before the splice point
# Allows downstream decoders to prepare
preroll_ms = 4000

# Unique program splice event ID base (incremented per event)
event_id_base = 1

# auto_detect: try in-band first, fall back to manifest tags
# manifest_only: only parse EXT-X-CUE-OUT/IN and DATERANGE
# inband_only: rely solely on in-band SCTE-35 PID passthrough
mode = "auto_detect"

# PTS calibration: measure actual output PTS to correct for ffmpeg transmux offset
calibration_enabled = true
calibration_delay_s = 10.0    # seconds to wait before first probe (let pipeline produce output)
calibration_retries = 3       # warn in logs after this many failed probe attempts

[tsduck]
# Output mode: "udp", "srt", "file"
output_mode = "file"

# UDP multicast output
udp_address = "239.1.1.1"
udp_port = 5000
udp_local = "192.168.1.42"

# SRT output (alternative)
# srt_address = "192.168.1.50"
# srt_port = 9000
# srt_mode = "caller"    # caller or listener
# srt_latency = 200

# File output (alternative)
file_path = "/opt/hls-scte35/output/live.ts"

# Target output bitrate for regulate plugin (bps)
output_bitrate = 40000000

# Inject directory for splice XML table files
inject_dir = "/opt/hls-scte35/inject"

# Continuity counter fix
fix_continuity = true

[drm]
# DRM decryption mode:
#   "none"   - no decryption (default)
#   "auto"   - detect from EXT-X-KEY in manifest, ffmpeg handles key fetch + decrypt
#   "aes128" - force AES-128 decryption with a pre-shared key
mode = "none"

# Pre-shared content key (32 hex digits = 16 bytes)
# Used when mode = "aes128". Overridden by DRM_KEY env var.
# key = "00112233445566778899aabbccddeeff"

# Pre-shared IV (32 hex digits). Optional: derived from media sequence if absent.
# iv = "00000000000000000000000000000001"

# HTTP headers for key server authentication (used in "auto" mode)
# When ffmpeg fetches the key from the EXT-X-KEY URI, these headers are included.
# key_server_headers = { Authorization = "Bearer <token>" }

[tuning]
# --- ffmpeg input buffering ---
# Reduce for lower latency; increase for stability on unreliable networks.
# "low_latency" sets: -fflags nobuffer -flags low_delay -analyzeduration 500000 -probesize 500000
# "default" uses ffmpeg defaults (higher latency, more stable)
# "custom" uses the individual values below
ffmpeg_buffer_mode = "default"    # default | low_latency | custom

# Custom ffmpeg values (only used when ffmpeg_buffer_mode = "custom")
# ffmpeg_analyzeduration = 5000000   # microseconds (ffmpeg default: 5000000)
# ffmpeg_probesize = 5000000         # bytes (ffmpeg default: 5000000)

# Real-time throttle: pace ffmpeg output to match source timing.
# true = add -re flag (correct for live sources, adds ~1 segment latency)
# false = no throttle (correct for VOD-as-live or when downstream handles pacing)
ffmpeg_realtime = true

# --- TSDuck regulate plugin ---
# The regulate plugin paces output to the configured bitrate.
# Set to 0 to disable regulation (tsp outputs as fast as it receives).
# regulate_bitrate overrides [tsduck] output_bitrate for the regulate plugin only.
# regulate_bitrate = 40000000

# --- PTS calibration ---
# How long to wait before probing the output for PTS calibration.
# Shorter = calibrate faster but may fail if pipeline hasn't produced output yet.
# Longer = more reliable but delays first accurate PTS-timed splice.
calibration_delay_s = 10.0

# --- SRT tuning ---
# srt_latency (in [tsduck]) controls the SRT buffer. Tradeoffs:
#   Low (50-100ms):  minimal delay, higher packet loss on lossy networks
#   Medium (200ms):  good balance for LAN/WAN (default)
#   High (500-2000ms): resilient to packet loss/jitter over internet

[grafana]
# Push SCTE-35 event annotations to Grafana for exact-time markers on dashboards.
# Leave url commented out to disable.
url = "http://localhost:3000"
auth = "admin:admin"       # "user:pass" for basic auth, or a Grafana API key

[logging]
log_dir = "/opt/hls-scte35/logs"
splice_log = "splice.log"
tsp_log = "tsp.log"
level = "INFO"    # DEBUG, INFO, WARN, ERROR
